services:
  - type: web
    name: ai-mapping-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: ALLOWED_ORIGINS
        value: https://csv-mapping-uniblox.pages.dev,https://*.csv-mapping-uniblox.pages.dev
      - key: GEMINI_API_KEY
        sync: false
